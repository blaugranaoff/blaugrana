<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EVO Regular 8 - Blaugrana</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,'Helvetica Neue',sans-serif;}
        body{background:linear-gradient(145deg,#0a0f1e 0%,#181c2e 100%);min-height:100vh;padding:15px;}
        .container{
            max-width:1400px;
            margin:0 auto;
            background:#1a1a2e;
            border-radius:30px;
            padding:20px;
            box-shadow:0 30px 50px rgba(0,0,0,0.5);
            border:2px solid #edbb00;
            position:relative;
            overflow:hidden;
        }
        .container::before{content:'';position:absolute;top:0;left:0;width:100%;height:8px;background:linear-gradient(90deg,#004d98 0%,#a50044 50%,#edbb00 100%);}
        
        .nav-container{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            position:relative;
        }
        .burger{
            display:none;
            font-size:2rem;
            color:#edbb00;
            cursor:pointer;
            background:none;
            border:2px solid #edbb00;
            border-radius:10px;
            padding:5px 15px;
            transition:0.3s;
            z-index:101;
        }
        .burger:hover{
            background:#edbb00;
            color:#1a1a2e;
        }
        .nav-menu{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            justify-content:flex-end;
        }
        .nav-link{
            display:inline-block;
            padding:10px 20px;
            background:#a50044;
            color:#edbb00;
            text-decoration:none;
            border-radius:50px;
            font-weight:700;
            font-size:0.95rem;
            border:2px solid #edbb00;
            transition:all 0.3s;
        }
        .nav-link.active{
            background:#004d98;
            box-shadow:0 3px 0 #a50044;
        }
        
        .team-header{
            background:linear-gradient(145deg,#004d98,#a50044);
            border-radius:25px;
            margin-bottom:30px;
            padding:30px 20px;
            border:3px solid #edbb00;
            box-shadow:0 0 30px rgba(237,187,0,0.3);
            text-align:center;
        }
        .team-name{
            font-size:clamp(2.5rem,8vw,4.5rem);
            font-weight:900;
            color:#edbb00;
            text-transform:uppercase;
            letter-spacing:4px;
            text-shadow:3px 3px 0 #004d98,6px 6px 0 #a50044;
            line-height:1.2;
            white-space:nowrap;
            overflow-x:auto;
            max-width:100%;
            padding:0 5px;
        }
        .team-motto{
            font-size:clamp(1.2rem,4vw,1.8rem);
            font-weight:500;
            color:#edbb00;
            letter-spacing:2px;
            text-transform:uppercase;
            text-shadow:1px 1px 0 rgba(0,77,152,0.5);
            margin-top:10px;
        }
        
        .tournament-title{
            font-size:2rem;
            font-weight:800;
            color:#edbb00;
            text-align:center;
            margin:20px 0 10px;
        }
        
        .stripes{
            width:100%;
            height:5px;
            display:flex;
            margin-bottom:20px;
        }
        .stripe-blue{height:100%;width:50%;background-color:#004d98;}
        .stripe-red{height:100%;width:50%;background-color:#a50044;}
        
        .table-container{
            overflow-x:auto;
            margin-bottom:30px;
        }
        
        table{
            width:100%;
            border-collapse:collapse;
            background:#1a1a2e;
            border:2px solid #edbb00;
            border-radius:20px;
            overflow:hidden;
        }
        
        th{
            background:#004d98;
            color:#edbb00;
            padding:15px 8px;
            font-weight:700;
            text-transform:uppercase;
            font-size:0.9rem;
            letter-spacing:0.5px;
        }
        
        td{
            padding:12px 8px;
            text-align:center;
            color:white;
            border-bottom:1px solid #333;
            vertical-align:middle;
        }
        
        tr:last-child td{
            border-bottom:none;
        }
        
        tr:hover td{
            background:rgba(0,77,152,0.2);
        }
        
        .team-logo{
            width:30px;
            height:30px;
            object-fit:contain;
            vertical-align:middle;
            margin-right:8px;
            border-radius:6px;
            background:rgba(0,0,0,0.2);
            padding:2px;
        }
        
        .team-name-cell{
            font-weight:700;
            text-align:left;
        }
        
        .blaugrana-row{
            background:rgba(165,0,68,0.2);
            font-weight:700;
        }
        
        .blaugrana-row td:first-child{
            border-left:4px solid #edbb00;
        }
        
        .footer{text-align:center;color:#a0a0a0;margin-top:40px;padding-top:20px;border-top:1px solid #333;}
        
        @media(max-width:768px){
            .burger{
                display:block;
            }
            .nav-menu{
                display:none;
                position:absolute;
                top:60px;
                right:0;
                background:#1a1a2e;
                border:2px solid #edbb00;
                border-radius:20px;
                padding:20px;
                flex-direction:column;
                width:220px;
                z-index:100;
                box-shadow:0 10px 30px rgba(0,0,0,0.5);
            }
            .nav-menu.show{
                display:flex;
            }
            .nav-link{
                width:100%;
                text-align:center;
                margin:5px 0;
            }
            .team-logo{
                width:25px;
                height:25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-container">
            <div></div>
            <div class="burger" onclick="toggleMenu()">☰</div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="news.html" class="nav-link">Новости</a>
                <a href="sostav.html" class="nav-link">Состав</a>
                <a href="matches.html" class="nav-link">Матчи</a>
                <a href="stats.html" class="nav-link">Статистика</a>
                <a href="tournament.html" class="nav-link active">Турнир</a>
                <a href="calendar.html" class="nav-link">Календарь</a>
            </div>
        </div>

        <div class="team-header">
            <div class="team-name">Blaugrana</div>
            <div class="team-motto"></div>
        </div>

        <div class="tournament-title">EVO Regular 8</div>
        <div class="stripes"><div class="stripe-blue"></div><div class="stripe-red"></div></div>

        <div class="table-container" id="tournamentTable">
            <!-- Таблица будет заполняться автоматически из data.js -->
        </div>

        <div class="footer">© 2025 Blaugrana</div>
    </div>

    <script src="data.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('show');
        }
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navMenu').classList.remove('show');
            });
        });

        // Функция для получения имени файла логотипа по названию команды
        function getLogoFile(teamName) {
            const logos = {
                "Blaugrana": "blaugrana.png",
                "БиК-Авто": "bik-avto.png",
                "Young boys": "young-boys.png",
                "Фк Перевозчик": "fk-perevozchik.png",
                "Палмейрас": "palmeiras.png",
                "Panther Team": "panther.png",
                "Stadium": "stadium.png",
                "YNWA": "ynwa.png",
                "Стройшоп": "stroyshop.png",
                "РИЗП": "rizp.png",
                "Transit": "transit.png",
                "Фк \"Забава\"": "zabava.png"
            };
            return logos[teamName] || null;
        }

        function updateTable() {
            const teams = [
                "Blaugrana",
                "БиК-Авто",
                "Young boys",
                "Фк Перевозчик",
                "Палмейрас",
                "Panther Team",
                "Stadium",
                "YNWA",
                "Стройшоп",
                "РИЗП",
                "Transit",
                "Фк \"Забава\""
            ];

            let stats = {};
            teams.forEach(team => {
                stats[team] = {
                    played: 0, wins: 0, draws: 0, losses: 0,
                    gf: 0, ga: 0, points: 0
                };
            });

            window.matches.forEach(match => {
                let [team1, score1, team2, score2] = match;
                
                stats[team1].played++;
                stats[team2].played++;
                stats[team1].gf += score1;
                stats[team1].ga += score2;
                stats[team2].gf += score2;
                stats[team2].ga += score1;

                if (score1 > score2) {
                    stats[team1].wins++;
                    stats[team1].points += 3;
                    stats[team2].losses++;
                } else if (score1 < score2) {
                    stats[team2].wins++;
                    stats[team2].points += 3;
                    stats[team1].losses++;
                } else {
                    stats[team1].draws++;
                    stats[team1].points += 1;
                    stats[team2].draws++;
                    stats[team2].points += 1;
                }
            });

            let tableData = teams.map(team => ({
                name: team,
                ...stats[team],
                gd: stats[team].gf - stats[team].ga
            }));

            tableData.sort((a, b) => {
                if (a.points !== b.points) return b.points - a.points;
                if (a.gd !== b.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>№</th>
                            <th>Лого</th>
                            <th>Команда</th>
                            <th>И</th>
                            <th>В</th>
                            <th>Н</th>
                            <th>П</th>
                            <th>ГЗ</th>
                            <th>ГП</th>
                            <th>±</th>
                            <th>О</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            tableData.forEach((team, index) => {
                let rowClass = team.name === "Blaugrana" ? 'class="blaugrana-row"' : '';
                let logoFile = getLogoFile(team.name);
                let logoHtml = logoFile ? 
                    `<img src="${logoFile}" class="team-logo" alt="лого" onerror="this.style.display='none'">` : 
                    `<span style="color:#edbb00;">⚽</span>`;
                
                html += `
                    <tr ${rowClass}>
                        <td>${index + 1}</td>
                        <td>${logoHtml}</td>
                        <td class="team-name-cell">${team.name}</td>
                        <td>${team.played}</td>
                        <td>${team.wins}</td>
                        <td>${team.draws}</td>
                        <td>${team.losses}</td>
                        <td>${team.gf}</td>
                        <td>${team.ga}</td>
                        <td>${team.gd}</td>
                        <td><strong>${team.points}</strong></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('tournamentTable').innerHTML = html;
        }

        window.onload = function() {
            if (window.matches) {
                updateTable();
            } else {
                console.error("Данные матчей не загружены");
                document.getElementById('tournamentTable').innerHTML = '<div class="empty-state">Нет данных о матчах</div>';
            }
        };
    </script>
</body>
</html>
